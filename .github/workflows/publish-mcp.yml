name: Publish to MCP Registry

# Регистрирует сервер в официальном реестре registry.modelcontextprotocol.io
# при публикации GitHub Release (тег vX.Y.Z). Аутентификация — GitHub OIDC,
# секретов не требует; namespace io.github.atomno-mcp/* подтверждается identity репо.
# PyPI-пакет публикуется отдельно (release-runbook); здесь — только метаданные.
#
# Только release:published — без workflow_dispatch (см. atomno-mcp-conventions §14).
# Повтор той же версии в реестре immutable → skip (exit 0), не красный CI.

on:
  release:
    types: [published]

permissions:
  id-token: write   # обязательно для OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Sync version into server.json
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version=$v | .packages[0].version=$v' server.json > server.tmp && mv server.tmp server.json
          echo "Synced server.json version to $VERSION"

      - name: Publish to MCP Registry
        run: |
          set +e
          output=$(./mcp-publisher publish 2>&1)
          rc=$?
          echo "$output"
          if [ $rc -eq 0 ]; then
            echo "Published successfully"
            exit 0
          fi
          if echo "$output" | grep -qiE 'duplicate version|cannot publish duplicate'; then
            echo "::notice title=Already published::Version already in MCP Registry — skipping (not an error)"
            exit 0
          fi
          exit $rc
